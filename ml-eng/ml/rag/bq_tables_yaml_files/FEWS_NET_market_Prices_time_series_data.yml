table_name: FEWS_NET_market_Prices_time_series_data
layer: time_series
domain: market_prices
child_of: FEWS_NET_market_prices_data_series

join_logic:
  parent_key: dataseries.id
  child_key: dataseries

semantic_role:
  describes: "Observed and derived commodity prices with temporal dynamics and inflation signals"

primary_keys:
  - id

time_dimensions:
  - period_date
  - start_date
  - created
  - modified
  - status_changed

geography:
  - country
  - country_code
  - admin_1
  - admin_2
  - geographic_group
  - fewsnet_region

market:
  - market
  - market_id
  - longitude
  - latitude

commodity:
  - cpcv2
  - product
  - product_source

pricing:
  - value
  - common_unit_price
  - common_currency_price
  - unit
  - currency
  - price_type
  - unit_type

temporal_features:
  - value_one_month_ago
  - value_one_year_ago
  - value_two_years_ago
  - value_three_years_ago
  - value_four_years_ago
  - value_five_years_ago
  - value_one_year_ahead

derived_metrics:
  - pct_change_from_one_month_ago
  - pct_change_from_one_year_ago
  - pct_change_from_two_year_average
  - pct_change_from_five_year_average
  - two_year_average
  - five_year_average

availability:
  - availability
  - availability_description

normalization:
  - common_unit
  - common_currency
  - exchange_rate

metadata:
  - datacollectionperiod
  - datacollection
  - dataseries_specialization_type
  - specialization_type
  - data_usage_policy
  - is_staple_food
  - collection_status
  - collection_status_changed
  - collection_schedule
  - status

nl2sql_role: child_observation_table
parent_table: FEWS_NET_market_prices_data_series
join_key: dataseries

# -----------------------------
# SEMANTIC INTENT LAYER
# -----------------------------
intent_space:
  primary_questions:
    - "How are food prices changing over time?"
    - "What are inflation signals in staple crops?"
    - "Which markets show volatility spikes?"

  aggregation_intent:
    allowed:
      - AVG(value)
      - MAX(value)
      - MIN(value)
      - STDDEV(value)
      - PCT_CHANGE(value)

    forbidden:
      - SUM(value)   # price aggregation invalid

# -----------------------------
# TIME SERIES SEMANTICS
# -----------------------------
time_logic:
  primary_time: period_date
  secondary_time_fields:
    - start_date
    - created
    - modified

  grain: "market × product × day/month observation"

# -----------------------------
# NL2SQL COLUMN MAP
# -----------------------------
fields:
  identifiers:
    - id
    - dataseries

  geography:
    - country
    - country_code
    - admin_1
    - admin_2

  market_location:
    - market
    - market_id
    - latitude
    - longitude

  commodity:
    - product
    - cpcv2

  pricing:
    - value
    - currency
    - unit
    - price_type

  derived_features:
    - pct_change_from_one_month_ago
    - pct_change_from_one_year_ago
    - two_year_average
    - five_year_average

# -----------------------------
# ANALYTICAL HINTS FOR LLM
# -----------------------------
reasoning_hints:
  inflation_detection:
    trigger: pct_change_from_one_year_ago > 30

  shock_detection:
    trigger: pct_change_from_one_month_ago > 20

  smoothing:
    use: five_year_average

# -----------------------------
# EMBEDDING TAGS
# -----------------------------
embedding_tags:
  - inflation
  - volatility
  - price_shocks
  - food_security_signals