table_name: FEWS_NET_Food_insecure_population_estimates_data_series
layer: data_series
domain: food_security_population
parent_child_role: parent

core_relationship:
  child_table: FEWS_NET_Food_insecure_population_estimates_time_series_data
  join_key: dataseries.id = time_series.dataseries

semantic_role:
  defines: "Population exposure to IPC phases (absolute headcount risk)"
  derived_from: FEWS_NET_food_security_classifications_data_series

primary_keys:
  - id

dimensions:
  geography:
    - country
    - admin_0
    - admin_1
    - admin_2
    - admin_3
    - admin_4
    - geographic_group
    - fewsnet_region
    - fnid

  classification_context:
    - phase
    - phase_name
    - scenario
    - scenario_name
    - forecast_horizon
    - indicator_name
    - indicator_abbreviation

  time_coverage:
    - first_period_date
    - last_period_date

metadata:
  - data_source_organization
  - data_source_document
  - datasourcedocument
  - datasourceorganization
  - datapoint_count
  - description
  - data_usage_policy