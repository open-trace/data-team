table_name: ilri_vegetation_survey_v1

fully_qualified_name: opentrace-prod-5ga4.raw_dev.ilri_vegetation_survey_v1

layer: raw_dev

domain:
  - vegetation_monitoring
  - rangeland_management
  - grazing_analysis
  - agroecology
  - environmental_observation

summary: >
  Georeferenced field vegetation survey dataset containing vegetation density,
  vegetation condition, grazing activity, carrying capacity,
  and proximity-to-water observations collected by ILRI CGIAR field teams.
  Each row represents a vegetation observation event at a specific GPS location.

grain: one_row_per_observation_event

primary_key:
  recommended:
    - generated_observation_id

recommended_key_generation:
  strategy: hash
  columns:
    - latitude
    - longitude
    - survey_date
    - photo_id

time_dimension:
  type: event_time
  event_column: survey_date
  temporal_granularity: daily

geography:
  latitude_column: latitude
  longitude_column: longitude
  geographic_scope:
    - East_Africa
    - pastoral_regions

business_entities:
  primary_entity: vegetation_observation_point

semantic_tags:
  - vegetation_health
  - grazing_pressure
  - livestock_feeding
  - ecological_monitoring
  - pasture_quality
  - water_access
  - rangeland_productivity
  - drought_resilience

joins:

  - target_table: africa_soil_moisture
    relationship: environmental_correlation
    join_strategy: spatial_temporal_join

  - target_table: africa_nasa_power_daily_summary_bronze
    relationship: climate_vegetation_analysis
    join_strategy: spatial_temporal_join

  - target_table: gbif_biodiversity_occurrence
    relationship: biodiversity_ecosystem_analysis
    join_strategy: geospatial_proximity

  - target_table: arcgis_vegetation_ndvi
    relationship: vegetation_validation
    join_strategy: spatial_overlap

  - target_table: arcgis_land_protected_areas
    relationship: conservation_monitoring
    join_strategy: spatial_intersection

  - target_table: ilri_crp_household_food_security_v1
    relationship: grazing_livelihood_analysis
    join_strategy: district_or_spatial_join

important_metrics:

  vegetation_density:
    - quantity_trees
    - quantity_shrubs
    - quantity_grass

  vegetation_condition:
    - leaves_trees
    - leaves_shrubs
    - leaves_grass

  grazing:
    - carrying_capacity
    - currently_grazing
    - palatability

  environmental_access:
    - distance_to_water_km

query_intents:
  - identify_degraded_grazing_areas
  - analyze_water_access_and_vegetation
  - correlate_grazing_pressure_with_vegetation_health
  - map_drought_stress_regions
  - evaluate_pasture_quality
  - identify_high_carrying_capacity_zones
  - compare_field_observations_with_ndvi

columns:

  - name: survey_date
    type: INTEGER
    description: Observation date in YYYYMMDD format.
    semantic_type:
      - event_date
      - temporal_dimension

  - name: latitude
    type: FLOAT64
    description: GPS latitude coordinate.
    semantic_type:
      - geographic_coordinate

  - name: longitude
    type: FLOAT64
    description: GPS longitude coordinate.
    semantic_type:
      - geographic_coordinate

  - name: geopoint_accuracy
    type: FLOAT64
    description: GPS positional accuracy in meters.
    semantic_type:
      - geospatial_quality_metric

  - name: distance_to_water_km
    type: FLOAT64
    description: Distance to nearest water source in kilometers.
    semantic_type:
      - water_access_metric

  - name: quantity_trees
    type: STRING
    description: Tree density classification.
    semantic_type:
      - vegetation_density_metric

  - name: quantity_shrubs
    type: STRING
    description: Shrub density classification.
    semantic_type:
      - vegetation_density_metric

  - name: quantity_grass
    type: STRING
    description: Grass density classification.
    semantic_type:
      - vegetation_density_metric

  - name: leaves_trees
    type: STRING
    description: Tree leaf condition indicator.
    semantic_type:
      - vegetation_health_metric

  - name: leaves_shrubs
    type: STRING
    description: Shrub leaf condition indicator.
    semantic_type:
      - vegetation_health_metric

  - name: leaves_grass
    type: STRING
    description: Grass leaf condition indicator.
    semantic_type:
      - vegetation_health_metric

  - name: palatability
    type: STRING
    description: Animal species able to feed on vegetation.
    semantic_type:
      - grazing_compatibility

  - name: carrying_capacity
    type: FLOAT64
    description: Estimated grazing carrying capacity.
    semantic_type:
      - pasture_productivity_metric

  - name: currently_grazing
    type: STRING
    description: Animal species currently grazing.
    semantic_type:
      - grazing_activity

  - name: photo_id
    type: STRING
    description: Identifier of associated survey image.
    semantic_type:
      - media_reference

  - name: ingestion_timestamp
    type: TIMESTAMP
    description: Bronze ingestion timestamp.
    semantic_type:
      - lineage_metadata

n2sql:

  default_filters:
    - survey_date
    - latitude
    - longitude

  spatial_operations:
    - ST_GEOGPOINT
    - ST_DISTANCE
    - ST_INTERSECTS
    - ST_WITHIN

  common_group_bys:
    - survey_date
    - quantity_grass
    - quantity_trees
    - currently_grazing

  common_aggregations:
    - avg(carrying_capacity)
    - avg(distance_to_water_km)

  derived_metrics:
    - vegetation_health_score
    - grazing_pressure_score
    - drought_risk_indicator
    - pasture_quality_index

  anti_patterns:
    - averaging_categorical_density_values
    - treating_pipe_delimited_fields_as_atomic_values

data_quality:

  known_issues:
    - no_primary_key_present
    - categorical_density_values_not_standardized
    - multi_value_columns_use_pipe_delimiters
    - survey_date_requires_date_conversion

  nullable_columns:
    - quantity_trees
    - quantity_shrubs
    - quantity_grass
    - leaves_trees
    - leaves_shrubs
    - leaves_grass
    - currently_grazing

silver_layer_recommendations:
  - generate_surrogate_primary_key
  - convert_lat_lon_to_geography
  - split_pipe_delimited_fields_into_arrays
  - normalize_density_categories
  - create_vegetation_health_score
  - derive_grazing_pressure_metrics
  - convert_survey_date_to_timestamp