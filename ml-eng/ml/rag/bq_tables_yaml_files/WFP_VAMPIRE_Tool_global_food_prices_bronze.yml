table_name: WFP_VAMPIRE_Tool_global_food_prices_bronze

fully_qualified_name: opentrace-prod-5ga4.bronze.WFP_VAMPIRE_Tool_global_food_prices_bronze

layer: bronze

domain:
  - food_prices
  - market_intelligence
  - food_security
  - trade
  - economics

entity_type: market_commodity_price_observation

dataset_type: monthly_market_time_series

grain: one_row_per_commodity_per_market_per_month

description: >
  Global market-level commodity price observations collected through the
  World Food Programme VAMPIRE platform. Tracks monthly food and non-food
  commodity prices across markets, administrative regions, and countries
  to support food security monitoring, inflation analysis, and market
  vulnerability assessment.

business_purpose:
  - food_price_monitoring
  - inflation_analysis
  - market_shock_detection
  - food_security_assessment
  - commodity_price_forecasting
  - humanitarian_response_planning
  - purchasing_power_analysis

source:

  provider: World Food Programme

  platform: VAMPIRE

  division: VAM

  source_type: humanitarian_market_monitoring

  ingestion_method: rest_api

  api_type: REST

  authentication: none

  ingestion_frequency: monthly

  historical_coverage: variable_by_country

primary_key:
  - adm0_id
  - mkt_id
  - cm_id
  - mp_month
  - mp_year

relationships:

  relationship_type: one_to_many

  joins_to:

    - table: FEWS_NET_market_Prices_time_series_data
      join_type: semantic
      purpose:
        - regional_price_validation
        - market_price_comparison
        - food_security_signal_detection

    - table: fao_trade_crops_livestock_bronze
      join_type: commodity_temporal
      join_keys:
        - country
        - commodity
        - year
      purpose:
        - import_price_correlation
        - trade_price_analysis
        - commodity_flow_analysis

    - table: fao_trade_indices_bronze
      join_type: economic_temporal
      purpose:
        - inflation_decomposition
        - price_index_validation
        - volatility_analysis

    - table: africa_gross_domestic_product_purchasing_power_parity_bronze
      join_type: country_year
      join_keys:
        - adm0_name
        - mp_year
      purpose:
        - affordability_analysis
        - purchasing_power_modeling

    - table: africa_Human_development_index
      join_type: country_year
      purpose:
        - socio_economic_price_impact
        - vulnerability_analysis

    - table: climatewatch_climate_health_impacts
      join_type: country_year
      purpose:
        - climate_vs_food_price_analysis
        - resilience_modeling

columns:

  - name: adm0_id
    type: INTEGER
    semantic_type: country_identifier
    description: unique administrative level 0 country identifier
    nullable: false
    example: 238
    role:
      - primary_key
      - foreign_key

  - name: adm0_name
    type: STRING
    semantic_type: country_name
    description: country name
    nullable: false
    example: Syrian Arab Republic
    analytical_role:
      - geographic_dimension

  - name: adm1_id
    type: INTEGER
    semantic_type: administrative_region_identifier
    description: first-level administrative division identifier
    nullable: true
    example: 2836

  - name: adm1_name
    type: STRING
    semantic_type: administrative_region_name
    description: first-level administrative division name
    nullable: true
    example: City_Damascus

  - name: mkt_id
    type: INTEGER
    semantic_type: market_identifier
    description: unique market identifier
    nullable: false
    example: 1112
    role:
      - primary_key

  - name: mkt_name
    type: STRING
    semantic_type: market_name
    description: market or retail outlet name
    nullable: false
    example: Sheikh Sa'ad
    analytical_role:
      - market_dimension

  - name: cm_id
    type: INTEGER
    semantic_type: commodity_identifier
    description: unique commodity identifier
    nullable: false
    example: 878
    role:
      - primary_key
      - foreign_key

  - name: cm_name
    type: STRING
    semantic_type: commodity_name
    description: commodity description and market type
    nullable: false
    example: Alcohol (spray) - Retail
    analytical_role:
      - commodity_dimension

  - name: cur_id
    type: FLOAT
    semantic_type: currency_identifier
    description: currency identifier
    nullable: true
    example: 0.0

  - name: cur_name
    type: STRING
    semantic_type: currency_code
    description: transaction currency code
    nullable: false
    example: SYP
    analytical_role:
      - currency_dimension

  - name: pt_id
    type: INTEGER
    semantic_type: price_type_identifier
    description: price type identifier
    nullable: true
    example: 15

  - name: pt_name
    type: STRING
    semantic_type: price_type
    description: type of market price observation
    nullable: true
    example: Retail
    analytical_role:
      - pricing_dimension

  - name: um_id
    type: INTEGER
    semantic_type: unit_measure_identifier
    description: unit of measure identifier
    nullable: true
    example: 115

  - name: um_name
    type: STRING
    semantic_type: unit_of_measure
    description: standardized quantity or volume unit
    nullable: false
    example: 200 ML

  - name: mp_month
    type: INTEGER
    semantic_type: observation_month
    description: month of observation
    nullable: false
    example: 6
    role:
      - primary_key
      - time_dimension

  - name: mp_year
    type: INTEGER
    semantic_type: observation_year
    description: year of observation
    nullable: false
    example: 2021
    role:
      - primary_key
      - time_dimension

  - name: mp_price
    type: FLOAT
    semantic_type: commodity_price
    description: observed market commodity price in local currency
    nullable: false
    example: 2491.6667
    analytical_role:
      - core_measure

  - name: mp_commoditysource
    type: STRING
    semantic_type: commodity_data_source
    description: source agency or provider for commodity observation
    nullable: true

ai_semantics:

  important_dimensions:
    - country
    - market
    - commodity
    - currency
    - price_type
    - month
    - year

  important_measures:
    - mp_price

  common_filters:
    - adm0_name
    - adm1_name
    - cm_name
    - pt_name
    - mp_year
    - mp_month
    - cur_name

  common_aggregations:
    - avg(mp_price)
    - min(mp_price)
    - max(mp_price)
    - median(mp_price)
    - count(distinct mkt_id)

  analytical_patterns:
    - food_inflation_detection
    - commodity_price_trends
    - cross_market_price_comparison
    - purchasing_power_analysis
    - market_volatility_analysis
    - humanitarian_risk_monitoring
    - supply_chain_disruption_detection

  query_patterns:

    - description: monthly commodity inflation
      sql_pattern: >
        GROUP BY cm_name, mp_year, mp_month

    - description: average market price by country
      sql_pattern: >
        GROUP BY adm0_name

    - description: retail versus wholesale comparison
      sql_pattern: >
        GROUP BY pt_name

    - description: commodity trend analysis
      sql_pattern: >
        ORDER BY mp_year, mp_month

silver_layer_transformations:

  - name: normalize_date_dimension
    logic: create_month_start_date_from_year_month

  - name: standardize_currency_codes
    purpose: harmonize_currency_analysis

  - name: generate_price_index
    purpose: inflation_tracking

  - name: commodity_name_standardization
    purpose: semantic_commodity_matching

  - name: market_geocoding
    purpose: geospatial_market_analysis

  - name: unit_normalization
    purpose: cross_market_price_comparison

data_quality:

  risks:
    - inconsistent_currency_reporting
    - missing_market_metadata
    - commodity_naming_variance
    - unit_inconsistency
    - delayed_reporting

  validation_rules:
    - mp_price >= 0
    - mp_month BETWEEN 1 AND 12
    - mp_year >= 1900
    - adm0_name IS NOT NULL
    - cm_name IS NOT NULL

  anomaly_detection:
    - sudden_price_spikes
    - zero_price_records
    - duplicate_market_observations

rag_optimization:

  embedding_priority:
    - food_prices
    - commodity_prices
    - inflation
    - market_prices
    - food_security
    - humanitarian_markets
    - retail_prices
    - agricultural_commodities

  semantic_keywords:
    - market_monitoring
    - food_inflation
    - commodity_trade
    - retail_prices
    - wholesale_prices
    - humanitarian_response
    - market_vulnerability
    - staple_foods
    - purchasing_power
    - economic_shocks

n2sql_hints:

  temporal_columns:
    - mp_month
    - mp_year

  metric_columns:
    - mp_price

  dimension_columns:
    - adm0_name
    - adm1_name
    - mkt_name
    - cm_name
    - pt_name
    - cur_name

  recommended_time_grains:
    - month
    - quarter
    - year

  recommended_calculations:
    - month_over_month_change
    - year_over_year_change
    - rolling_average
    - inflation_rate

  recommended_groupings:
    - commodity
    - country
    - market
    - price_type