
knowledge_graph: OpenTrace_Agricultural_Intelligence_Graph

version: 1.0

purpose: >
  Unified semantic layer enabling NL2SQL agents to translate natural language
  into multi-table analytical queries across agriculture, climate, trade,
  biodiversity, soil, food security, and socio-economic datasets.

core_entity_types:

  geography_entity:
    primary_keys: [country_code, fnid, admin_1, admin_2, lat, lon]
    datasets:
      - yield_raw_data
      - fao_land_use_bronze
      - fao_fertilizers_nutrient_bronze
      - fao_pesticides_use_bronze
      - fao_trade_crops_livestock_bronze
      - feewsnet_all_tables
      - gbif_biodiversity_occurrence
      - nasa_power
      - soil_moisture
      - isda_soil_property
      - air_quality
      - ilri_datasets

  time_entity:
    keys: [year, month, day, timestamp, season_name, planting_year, harvest_year]
    semantics:
      - temporal_alignment
      - trend_analysis
      - forecasting_horizon
    datasets:
      - all_time_series_tables

  crop_entity:
    keys: [product, item, crop_production_system]
    maps_to:
      - FAO items
      - yield_raw_data.product
      - FEWS market commodities
      - WFP VAM commodities
    semantics:
      - production
      - consumption
      - trade_flow
      - price_signal

  climate_entity:
    keys: [par_solar_at_noon, shortwave_irradiance, uvb, uva, temperature]
    datasets:
      - nasa_power_daily
      - nasa_power_hourly
      - air_quality
    semantics:
      - environmental_stress
      - evapotranspiration_proxy
      - crop_growth_conditions

  soil_entity:
    keys: [property, depth, value]
    datasets:
      - isda_soil_property
      - soil_moisture
    semantics:
      - fertility
      - water_retention
      - nutrient_availability

  biodiversity_entity:
    keys: [gbif_id, taxon_key, species, genus]
    datasets:
      - gbif_biodiversity_occurrence
    semantics:
      - ecosystem_health
      - crop_wild_relationships
      - habitat_pressure

  socio_economic_entity:
    keys: [hd_index, income, fies_score, tva_per_mae]
    datasets:
      - ilri_household
      - fao_trade_indices
      - climatewatch
    semantics:
      - poverty
      - food_security
      - labor_capacity
      - market_access

  food_security_entity:
    keys: [ipc_phase, population_estimate, classification_scale]
    datasets:
      - FEWSNET_food_security_classifications
      - FEWSNET_population_estimates
    semantics:
      - hunger_severity
      - crisis_detection
      - humanitarian_response

  market_entity:
    keys: [price, currency, commodity, market_id, mkt_name]
    datasets:
      - WFP_market_prices
      - FEWS market prices
    semantics:
      - inflation
      - price_shock_detection
      - supply_chain_stress

---

global_join_registry:

  primary_spatial_key:
    fnid:
      connects:
        - yield_raw_data
        - FEWSNET
        - ILRI vegetation survey

    country_code:
      connects:
        - FAO datasets
        - ClimateWatch
        - WFP prices
        - Trade datasets
        - Soil datasets

    geometry_based:
      lat_lon:
        connects:
          - NASA POWER
          - soil_moisture
          - GBIF
          - air_quality
          - vegetation_survey

---

semantic_relationships:

  climate_affects_agriculture:
    source: climate_entity
    target: crop_entity
    path:
      - NASA POWER → yield_raw_data
      - air_quality → crop stress → yield

  soil_controls_yield:
    source: soil_entity
    target: crop_entity
    path:
      - isda_soil_property → yield_raw_data
      - soil_moisture → production_variability

  biodiversity_indicates_ecosystem_health:
    source: biodiversity_entity
    target: crop_entity
    path:
      - GBIF → land suitability → yield

  trade_reflects_production_pressure:
    source: market_entity
    target: crop_entity
    path:
      - FAO trade → yield imbalance → import/export dependency

  food_security_is_output_signal:
    source: food_security_entity
    target: all_entities
    path:
      - yield + prices + climate → IPC phase → population impact

  socio_economic_modulates_resilience:
    source: socio_economic_entity
    target: food_security_entity
    path:
      - HDI + income + FIES → vulnerability index

---

nl2sql_agent_rules:

  entity_resolution:
    - map synonyms → canonical entity (e.g., maize = corn depending on dataset)
    - resolve product → FAO item_code where possible
    - normalize country names → ISO3

  join_priority_order:
    1. country_code
    2. fnid
    3. admin_1/admin_2
    4. lat/lon spatial join

  aggregation_safety:
    - never average ratios (recompute yield)
    - separate units before aggregation
    - isolate scenario-based FEWS data

  temporal_alignment_rules:
    - yield: planting_year as anchor
    - climate: timestamp alignment window ± season
    - trade: monthly aggregation
    - food_security: reporting_date alignment

  ambiguity_handling:
    - if crop unspecified → default to top commodity by country
    - if region missing → fallback country-level aggregation
    - if time missing → return latest available snapshot

---

cross_dataset_reasoning_paths:

  yield_prediction_pipeline:
    - climate (NASA POWER)
    - soil (ISDA)
    - fertilizer (FAO RFN)
    - pesticides (FAO RP)
    → yield_raw_data

  food_security_pipeline:
    - yield_raw_data
    - WFP prices
    - FEWS trade flows
    - climate shocks
    → IPC classification

  ecosystem_health_pipeline:
    - GBIF biodiversity
    - vegetation survey
    - soil moisture
    → land suitability index

  economic_trade_pipeline:
    - FAO TCL trade
    - FAO TI indices
    - market prices
    → trade balance + inflation signals

---

agent_query_intent_mapping:

  "why did yield drop":
    activates:
      - climate_entity
      - soil_entity
      - market_entity

  "food insecurity risk":
    activates:
      - food_security_entity
      - yield_raw_data
      - WFP prices
      - FEWS trade

  "best crops for region":
    activates:
      - soil_entity
      - climate_entity
      - yield history
      - biodiversity constraints

  "trade dependency":
    activates:
      - FAO TCL
      - FAO TI
      - production vs import comparison
