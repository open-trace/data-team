table_name: isda_soil_property

domain:
  - soil
  - agronomy
  - geospatial
  - environmental

entity_type: soil_property_observation

grain: coordinate_depth_property

description: >
  High-resolution African soil property predictions from iSDAsoil.
  Represents chemical and physical soil characteristics by location and depth.

business_purpose:
  - fertilizer_recommendation
  - crop_suitability
  - soil_health_monitoring
  - agronomic_modeling

source:
  provider: iSDA
  ingestion_type: geospatial_raster
  source_format: GeoTIFF
  update_frequency: periodic

primary_key:
  - latitude
  - longitude
  - depth
  - property

columns:

  - name: latitude
    type: FLOAT64
    semantic_type: projected_coordinate_y
    description: projected northing coordinate
    nullable: false

  - name: longitude
    type: FLOAT64
    semantic_type: projected_coordinate_x
    description: projected easting coordinate
    nullable: false

  - name: property
    type: STRING
    semantic_type: soil_property
    description: soil attribute measured at location
    examples:
      - aluminum
      - nitrogen
      - phosphorus
      - ph

  - name: depth
    type: STRING
    semantic_type: soil_depth_interval
    examples:
      - 0-20cm
      - 20-50cm

  - name: value
    type: FLOAT64
    semantic_type: quantitative_measurement
    description: predicted soil property value

semantic_relationships:

  joins_to:

    - table: fao_land_use_bronze
      join_type: spatial
      join_keys:
        - geography
      purpose:
        - land_suitability_analysis
        - crop_zone_mapping

    - table: gbif_biodiversity_occurrence
      join_type: spatial
      join_keys:
        - latitude
        - longitude
      purpose:
        - biodiversity_soil_correlation
        - ecosystem_health_analysis

    - table: africa_soil_moisture
      join_type: spatial_temporal
      purpose:
        - drought_resilience
        - soil_water_retention_analysis

ai_semantics:

  important_dimensions:
    - geography
    - soil_depth
    - soil_property

  important_measures:
    - value

  analytical_patterns:
    - nutrient_deficiency_detection
    - crop_recommendation
    - soil_quality_scoring

  common_filters:
    - property
    - depth

  common_aggregations:
    - avg(value)
    - min(value)
    - max(value)

silver_layer_transformations:

  - reproject_coordinates_to_wgs84
  - normalize_property_units
  - generate_geography_column
  - validate_spatial_bounds

data_quality:

  risks:
    - projected_coordinate_confusion
    - unit_inconsistency
    - water_body_nulls

  validation_rules:
    - value IS NOT NULL
    - property IS NOT NULL