name: fao_trade_indices_bronze

description: agricultural trade indices measuring price and quantity changes vs base period (FAO TI domain)

granularity: country_year_item_element
source_type: agriculture_trade_indices
dataset_type: time_series_index

geo:
  type: country
  column: area
  code_column: country_code

time:
  column: year
  type: year

entities:
  - country_code
  - item
  - element
  - item_code
  - element_code

metrics:
  - name: value
    unit: index

column_roles:
  domain_code: metadata
  domain: metadata
  area_code: metadata
  area: geo
  element_code: entity
  element: entity
  item_code: entity
  item: entity
  year: time
  unit: metadata
  value: metric
  country_code: geo_code
  country_name: geo
  data_source: metadata

constraints:
  requires_time_filter: true
  requires_geo_filter: true
  requires_entity_filter:
    - item
    - element
  index_data: true

semantic_aliases:
  item:
    - commodity
    - agricultural product
  element:
    - price index
    - quantity index
    - trade index
  value:
    - index value
    - relative change
    - normalized value

canonical_mapping:
  country: area
  country_code: country_code
  year: year
  commodity: item
  index_type: element
  index_value: value

query_hints:
  default_aggregation: AVG
  common_group_by: [country_code, year, item, element]
  time_range_supported: true
  requires_base_period_context: true

semantic_relationships:
  shares_geo_with:
    - fao_trade_crops_livestock_bronze
    - africa_Human_development_index

  shares_time_with:
    - fao_trade_crops_livestock_bronze
    - fao_fertilizers_nutrient_bronze

  comparable_metrics:
    - table: fao_trade_crops_livestock_bronze
      metric: value
      relationship: "index vs absolute trade flows"

    - table: africa_gross_domestic_product_purchasing_power_parity_bronze
      metric: gdp_per_capita_ppp
      relationship: "trade indices vs economic development"

  contextual_links:
    - type: decomposition
      target_table: fao_trade_crops_livestock_bronze
      description: "trade indices explain variation in raw trade values"

    - type: inflation_proxy
      target_table: fao_trade_crops_livestock_bronze
      description: "price indices reflect commodity inflation trends"

relationships:
  joinable_on: country_code

data_quality:
  numeric_columns:
    - value
    - year
    - item_code
    - element_code