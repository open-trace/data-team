name: africa_Human_development_index

description: Human Development Index (HDI) time series for African countries

granularity: country_year
source_type: socioeconomic
dataset_type: time_series

geo:
  type: country
  column: country
  code_column: alpha_3_code

time:
  column: year
  type: year

entities:
  - country
  - alpha_3_code

metrics:
  - name: index
    description: human development index score
    unit: ratio_0_1

column_roles:
  country: geo
  alpha_3_code: geo_code
  year: time
  index: metric
  Row: metadata

constraints:
  requires_time_filter: true
  requires_geo_filter: true

semantic_aliases:
  index:
    - hdi
    - human development
    - development index
    - living standards
    - welfare

canonical_mapping:
  country: country
  country_code: alpha_3_code
  year: year
  hdi: index
  development_indicator: index

query_hints:
  default_aggregation: AVG
  common_group_by: [country, year]
  time_range_supported: true

semantic_relationships:
  shares_geo_with:
    - africa_gross_domestic_product_purchasing_power_parity_bronze
    - fao_rfn
    - WFP_VAMPIRE_Tool_global_food_prices

  shares_time_with:
    - africa_gross_domestic_product_purchasing_power_parity_bronze
    - fao_rfn

  comparable_metrics:
    - table: africa_gross_domestic_product_purchasing_power_parity_bronze
      metric: gdp_per_capita_ppp
      relationship: "income vs human development"

    - table: fao_rfn
      metric: value
      relationship: "agricultural production vs development outcomes"

  contextual_links:
    - type: explanatory
      target_table: africa_gross_domestic_product_purchasing_power_parity_bronze
      description: "economic output influences human development levels"

    - type: correlation
      target_table: fao_rfn
      description: "agricultural productivity linked to development outcomes"

relationships:
  joinable_on: alpha_3_code

data_quality:
  numeric_columns:
    - index
  expected_range:
    index: [0, 1]