table_name: opentrace-prod-5ga4.bronze.yield_raw_data

description: >
  Agricultural yield time-series dataset capturing crop production,
  area, and derived yield metrics across African countries at
  administrative and seasonal granularity.

grain: crop × location (fnid/admin) × season × planting_year

entity_type: agricultural_production_observation

source:
  provider: IFPRI Dataverse / agricultural data repositories
  ingestion_type: batch
  api_type: REST (Dataverse APIs)
  frequency: periodic / one-time loads
  historical_coverage: multi-year (country-dependent)

relationships:
  primary_key:
    type: composite_logical
    fields: [fnid, product, planting_year, season_name]

  foreign_keys:
    country_code: country_reference_table
    admin_1: geographic_boundary_table_level_1
    admin_2: geographic_boundary_table_level_2

  join_strategy:
    - country_level: country_code
    - subnational: admin_1, admin_2
    - spatial_identifier: fnid (cross-dataset geo join key)

  cardinality:
    location: one_to_many_over_time

semantic_role:
  primary_domain: crop_yield_monitoring
  supports:
    - agricultural_productivity_analysis
    - food_security_modeling
    - climate_impact_assessment
    - regional_yield_comparison

business_questions_supported:
  - Which crops have highest yield per region over time?
  - How does yield vary by season and planting year?
  - Which districts show declining productivity trends?
  - How does production scale with cultivated area?
  - Which regions are underperforming relative to peers?

aggregation_rules:
  yield:
    type: derived_metric
    formula: production / area
    caution: recompute if production or area aggregated

  production:
    aggregation: sum_by_crop_location_time

  area:
    aggregation: sum_by_geography_time

filtering_guidance:
  - exclude admin_2 = "none" for high-quality spatial analysis
  - validate qc_flag == 0 for clean training data
  - ensure season_name consistency before grouping
  - handle missing planting_month / harvest_month explicitly

sql_generation_hints:
  - use fnid for stable geographic joins across datasets
  - avoid joining only on admin names (inconsistent spelling risk)
  - recompute yield rather than averaging precomputed values
  - always group by product + location + time grain
  - treat planting_year as primary temporal anchor

columns:

  - name: fnid
    type: string
    description: Geographic unit identifier linking survey and spatial datasets
    semantic_role: spatial_key
    nullable: false
    example: AO2008A101

  - name: country
    type: string
    description: Country name of observation
    semantic_role: geography
    nullable: false
    example: Angola

  - name: country_code
    type: string
    description: ISO-like country identifier
    semantic_role: foreign_key_country
    nullable: false
    example: AO

  - name: admin_1
    type: string
    description: First-level administrative region
    semantic_role: subnational_geography
    nullable: true
    example: Bengo

  - name: admin_2
    type: string
    description: Second-level administrative region
    semantic_role: subnational_geography
    nullable: true
    example: none

  - name: product
    type: string
    description: Crop or agricultural commodity
    semantic_role: agricultural_entity
    nullable: false
    example: Banana

  - name: season_name
    type: string
    description: Agricultural season identifier
    semantic_role: temporal_segment
    nullable: true
    example: Main

  - name: planting_year
    type: integer
    description: Year crop was planted
    semantic_role: time_anchor
    nullable: false
    example: 2008

  - name: planting_month
    type: integer
    description: Month of planting
    semantic_role: time_detail
    nullable: true
    example: 10

  - name: harvest_year
    type: integer
    description: Year of harvest
    semantic_role: time_anchor
    nullable: false
    example: 2009

  - name: harvest_month
    type: integer
    description: Month of harvest
    semantic_role: time_detail
    nullable: true
    example: 4

  - name: crop_production_system
    type: string
    description: Farming system type (rainfed, irrigated, mixed)
    semantic_role: agronomic_context
    nullable: true
    example: All (PS)

  - name: qc_flag
    type: integer
    description: Quality control indicator (0 = valid data)
    semantic_role: data_quality
    nullable: true
    example: 0

  - name: area
    type: float
    description: Cultivated land area
    semantic_role: input_feature
    unit: hectares_or_dataset_unit
    nullable: true
    example: 1364.0

  - name: production
    type: float
    description: Total crop production volume
    semantic_role: output_feature
    unit: metric_tons_or_dataset_unit
    nullable: true
    example: 19588.0

  - name: yield
    type: float
    description: Derived yield metric (production per unit area)
    semantic_role: derived_metric
    computation: production / area
    nullable: true
    example: 14.36

data_quality:
  known_issues:
    - missing admin_2 values ("none")
    - inconsistent area/production reporting
    - derived yield may be precomputed inconsistently

  recommendations:
    - recompute yield during modeling
    - validate qc_flag before training
    - standardize season naming conventions

temporal_model:
  type: multi_stage_crop_cycle
  anchors:
    - planting_year
    - harvest_year
  optional_resolution:
    - planting_month
    - harvest_month