name: arcgis_vegetation_ndvi

description: vegetation health index (NDVI) grid data

granularity: grid_cell
source_type: climate
dataset_type: geospatial

geo:
  type: polygon
  geometry: geometry_wkt

entities:
  - grid_id

metrics:
  - name: mean
    unit: ratio
  - name: mean_1
    unit: ratio

column_roles:
  grid_id: entity
  geometry_wkt: geo
  mean: metric
  mean_1: metric
  shape__area: metric

constraints:
  requires_geo_filter: true

semantic_aliases:
  mean:
    - ndvi
    - vegetation index
    - crop health

canonical_mapping:
  vegetation_index: mean
  location: geometry_wkt

semantic_relationships:
  shares_geo_with:
    - yield_raw_data
    - africa_soil_moisture

  comparable_metrics:
    - table: yield_raw_data
      metric: yield
      relationship: "vegetation health vs crop yield"

relationships:
  joinable_on: geometry_wkt