name: africa_nasa_power_hourly_bronze

description: hourly solar radiation and environmental data for African regions (NASA POWER)

granularity: point_hour
source_type: climate
dataset_type: time_series

geo:
  type: point
  lat: latitude
  lon: longitude
  region: admin_region
  code_column: country_code

time:
  column: observation_time
  type: timestamp

entities:
  - country_code
  - admin_region

metrics:
  - name: par_total
    unit: w_m2
  - name: shortwave_irradiance
    unit: kw_m2_hr
  - name: uva_irradiance
    unit: w_m2
  - name: uvb_irradiance
    unit: w_m2
  - name: elevation
    unit: meters

column_roles:
  observation_time: time
  latitude: geo
  longitude: geo
  admin_region: geo
  country_code: geo_code
  par_total: metric
  shortwave_irradiance: metric
  uva_irradiance: metric
  uvb_irradiance: metric
  elevation: metric
  ingestion_id: metadata
  source: metadata
  dataset_code: metadata
  fetched_at: metadata

constraints:
  requires_time_filter: true
  requires_geo_filter: true

semantic_aliases:
  par_total:
    - solar radiation
    - photosynthesis light
    - par
  shortwave_irradiance:
    - solar energy
    - irradiance
  uva_irradiance:
    - uv radiation
  uvb_irradiance:
    - uv index
  elevation:
    - altitude

canonical_mapping:
  country_code: country_code
  region: admin_region
  lat: latitude
  lon: longitude
  datetime: observation_time
  solar_radiation: par_total
  irradiance: shortwave_irradiance

query_hints:
  default_aggregation: AVG
  common_group_by: [admin_region, observation_time]
  time_range_supported: true
  supports_downsampling: true

semantic_relationships:
  shares_geo_with:
    - africa_nasa_power_daily_summary_bronze
    - fao_rfn
    - yield_raw_data

  shares_time_with:
    - africa_nasa_power_daily_summary_bronze

  derivable_to:
    - table: africa_nasa_power_daily_summary_bronze
      method: aggregation
      description: "hourly data can be aggregated into daily summaries"

  comparable_metrics:
    - table: africa_nasa_power_daily_summary_bronze
      metric: par_solar_at_noon
      relationship: "hourly vs daily radiation patterns"

    - table: yield_raw_data
      metric: yield
      relationship: "solar radiation vs crop yield"

  contextual_links:
    - type: explanatory
      target_table: africa_nasa_power_daily_summary_bronze
      description: "hourly radiation explains daily averages"

    - type: correlation
      target_table: yield_raw_data
      description: "intra-day radiation impacts crop stress and productivity"

relationships:
  joinable_on: country_code

data_quality:
  numeric_columns:
    - par_total
    - shortwave_irradiance
    - uva_irradiance
    - uvb_irradiance
    - elevation