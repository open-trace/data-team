tables:
  - name: africa_gross_domestic_product_purchasing_power_parity_bronze
    description: GDP per capita (PPP-adjusted) time series for African countries

    granularity: country_year
    source_type: economic
    dataset_type: time_series

    geo:
      type: country
      column: country_name
      code_column: country_code

    time:
      column: observation_year
      type: year

    entities:
      - country_name
      - country_code

    metrics:
      - name: gdp_per_capita_ppp
        description: GDP per capita adjusted for purchasing power parity
        unit: international_dollars

    column_roles:
      country_name: geo
      country_code: geo_code
      observation_year: time
      gdp_per_capita_ppp: metric
      ingested_at: metadata
      Row: metadata

    constraints:
      requires_time_filter: true
      requires_geo_filter: true

    semantic_aliases:
      gdp_per_capita_ppp:
        - gdp
        - gdp per capita
        - economic output per person
        - purchasing power
        - income level

    canonical_mapping:
      country: country_name
      country_code: country_code
      year: observation_year
      gdp: gdp_per_capita_ppp
      economic_indicator: gdp_per_capita_ppp

    query_hints:
      default_aggregation: AVG
      common_group_by: [country_name, observation_year]
      time_range_supported: true

    relationships:
      joinable_on: country_code
      related_tables:
        - africa_Human_development_index
        - openaire_organizations_bronze

    data_quality:
      numeric_columns:
        - gdp_per_capita_ppp
      expected_range:
        gdp_per_capita_ppp: [0, 200000]