table_name: FEWS_NET_food_security_classifications_time_series_data
layer: time_series
domain: food_security
child_of: FEWS_NET_food_security_classifications_data_series

join_logic:
  parent_key: dataseries.id
  child_key: dataseries

semantic_role:
  describes: "Observed + projected IPC phase severity over time"
  measurement_type: ordinal_index (1.0 to 5.0)

primary_keys:
  - id

time_dimensions:
  - reporting_date
  - created
  - modified
  - status_changed
  - projection_start
  - projection_end

geography:
  - country
  - country_code
  - geographic_group
  - fewsnet_region
  - geographic_unit
  - geographic_unit_name
  - geographic_unit_full_name
  - fnid

metrics:
  - value
  - pct_phase3
  - pct_phase4
  - pct_phase5

scenario_context:
  - scenario
  - scenario_name

metadata:
  - collection_status
  - collection_status_changed
  - collection_schedule
  - status
  - preference_rating
  - is_allowing_for_assistance