table_name: nakuru_air_quality_archive

fully_qualified_name: opentrace-prod-5ga4.bronze.nakuru_air_quality_archive

layer: bronze

domain:
  - air_quality
  - climate
  - environmental_monitoring
  - agriculture
  - geospatial

entity_type: air_quality_sensor_observation

dataset_type: high_frequency_time_series

grain: one_row_per_sensor_per_timestamp

description: >
  Hyper-local air quality observations collected from low-cost environmental
  sensors deployed in Nakuru, Kenya. Captures particulate matter concentration
  and environmental conditions at high temporal resolution for climate,
  agricultural, and ecosystem analysis.

business_purpose:
  - air_quality_monitoring
  - agricultural_risk_analysis
  - climate_health_assessment
  - environmental_exposure_modeling
  - pollution_hotspot_detection
  - ecosystem_health_analysis

source:

  provider: Sensor.Community

  alternative_sources:
    - OpenAQ
    - PurpleAir

  source_type: citizen_science_sensor_network

  ingestion_method:
    - rest_api
    - csv_archive

  endpoints:
    - /static/v1/data.json
    - archive_s3_buckets

  authentication: none

  ingestion_frequency: monthly

  historical_coverage: since_2021

  pagination_strategy: date_partitioned_archives

primary_key:
  - sensor_id
  - timestamp

relationships:

  relationship_type: one_to_many

  joins_to:

    - table: fao_land_use_bronze
      join_type: spatial
      join_keys:
        - lat
        - lon
      purpose:
        - pollution_vs_land_use_analysis
        - agricultural_zone_pollution_detection
        - industrial_exposure_mapping

    - table: africa_soil_moisture
      join_type: spatial_temporal
      purpose:
        - humidity_pollution_interaction
        - climate_stress_analysis

    - table: africa_nasa_power_daily_summary_bronze
      join_type: spatial_temporal
      purpose:
        - atmospheric_condition_analysis
        - solar_radiation_pollution_correlation

    - table: gbif_biodiversity_occurrence
      join_type: spatial
      purpose:
        - biodiversity_pollution_impact_analysis
        - ecosystem_health_monitoring

columns:

  - name: sensor_id
    type: INTEGER
    semantic_type: sensor_identifier
    description: unique hardware node identifier
    nullable: false
    example: 144
    role:
      - primary_key

  - name: sensor_type
    type: STRING
    semantic_type: sensor_model
    description: hardware model used for measurement
    nullable: false
    example: SDS011

  - name: location
    type: INTEGER
    semantic_type: internal_location_identifier
    description: source system location identifier
    nullable: false
    example: 3528

  - name: lat
    type: FLOAT
    semantic_type: latitude
    description: sensor latitude in WGS84
    nullable: false
    example: -0.286

  - name: lon
    type: FLOAT
    semantic_type: longitude
    description: sensor longitude in WGS84
    nullable: false
    example: 36.067

  - name: timestamp
    type: TIMESTAMP
    semantic_type: observation_timestamp
    description: precise UTC timestamp of sensor observation
    nullable: false
    example: 2021-08-03T07:20:18Z
    role:
      - primary_key
      - time_dimension

  - name: pm10
    type: FLOAT
    semantic_type: particulate_matter_pm10
    description: particulate matter concentration below 10 micrometers
    nullable: true
    unit: ug_per_m3
    example: 5.0
    analytical_role:
      - air_pollution_indicator

  - name: pm2_5
    type: FLOAT
    semantic_type: particulate_matter_pm2_5
    description: particulate matter concentration below 2.5 micrometers
    nullable: true
    unit: ug_per_m3
    example: 4.0
    analytical_role:
      - fine_particle_pollution_indicator

  - name: humidity_pct
    type: FLOAT
    semantic_type: relative_humidity
    description: relative humidity percentage
    nullable: true
    unit: percent

  - name: temp_c
    type: FLOAT
    semantic_type: air_temperature_celsius
    description: ambient air temperature
    nullable: true
    unit: celsius

  - name: source_archive
    type: STRING
    semantic_type: ingestion_batch_identifier
    description: archive batch source reference
    nullable: false
    example: August 2021 Archive

ai_semantics:

  important_dimensions:
    - timestamp
    - sensor_type
    - geography
    - source_archive

  important_measures:
    - pm10
    - pm2_5
    - humidity_pct
    - temp_c

  common_filters:
    - timestamp
    - sensor_type
    - pm10
    - pm2_5

  common_aggregations:
    - avg(pm10)
    - avg(pm2_5)
    - max(pm10)
    - max(pm2_5)
    - avg(temp_c)
    - avg(humidity_pct)

  analytical_patterns:
    - pollution_hotspot_detection
    - temporal_air_quality_trends
    - crop_exposure_analysis
    - particulate_spike_detection
    - environmental_health_monitoring
    - pollution_vs_humidity_analysis

  query_patterns:

    - description: identify pollution spikes
      sql_pattern: >
        WHERE pm10 > threshold

    - description: hourly air quality averages
      sql_pattern: >
        GROUP BY TIMESTAMP_TRUNC(timestamp, HOUR)

    - description: geospatial pollution mapping
      sql_pattern: >
        ST_GEOGPOINT(lon, lat)

silver_layer_transformations:

  - name: deduplicate_sensor_records
    logic: >
      QUALIFY ROW_NUMBER()
      OVER(PARTITION BY sensor_id, timestamp
      ORDER BY ingested_at DESC)=1

  - name: utc_to_eat_conversion
    purpose: local_diurnal_analysis

  - name: outlier_flagging
    rule: pm10 > 500

  - name: geography_generation
    logic: ST_GEOGPOINT(lon, lat)

  - name: sensor_capability_mapping
    purpose: distinguish particulate_only_vs_multi_sensor_nodes

data_quality:

  risks:
    - duplicate_sensor_posts
    - humidity_related_sensor_spikes
    - missing_temperature_values
    - incomplete_sensor_capabilities
    - intermittent_sensor_connectivity

  validation_rules:
    - sensor_id IS NOT NULL
    - timestamp IS NOT NULL
    - lat BETWEEN -90 AND 90
    - lon BETWEEN -180 AND 180

  anomaly_detection:
    - pm10 > 500
    - pm2_5 > 500
    - repeated_identical_values

rag_optimization:

  embedding_priority:
    - air_quality
    - pm10
    - pm2_5
    - particulate_pollution
    - agriculture
    - climate
    - geospatial
    - environmental_health

  semantic_keywords:
    - particulate_matter
    - pollution
    - environmental_sensor
    - atmospheric_conditions
    - crop_health
    - climate_risk
    - sensor_network
    - rift_valley

n2sql_hints:

  temporal_column: timestamp

  geospatial_columns:
    - lat
    - lon

  metric_columns:
    - pm10
    - pm2_5
    - humidity_pct
    - temp_c

  recommended_time_grains:
    - hour
    - day
    - month

  recommended_spatial_functions:
    - ST_GEOGPOINT
    - ST_DISTANCE
    - ST_INTERSECTS