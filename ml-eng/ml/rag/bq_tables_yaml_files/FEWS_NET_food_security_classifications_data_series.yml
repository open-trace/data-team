table_name: FEWS_NET_food_security_classifications_data_series

role: data_series
domain: food_security_ipc

nl2sql_role: parent

child_table: FEWS_NET_food_security_classifications_time_series_data
join_key: dataseries.id = time_series.dataseries

# -----------------------------
# SEMANTIC INTENT LAYER
# -----------------------------
intent_space:
  primary_questions:
    - "What is the food insecurity level in a region?"
    - "Where are IPC Phase 4–5 crises occurring?"
    - "How does food insecurity evolve over time?"

  critical_use_case:
    - "ground_truth_label_for_ml"

# -----------------------------
# CLASSIFICATION SEMANTICS
# -----------------------------
classification_system:
  scale:
    min: 1.0
    max: 5.0
    meaning:
      1: minimal
      2: stressed
      3: crisis
      4: emergency
      5: famine

# -----------------------------
# FILTER LOGIC
# -----------------------------
filters:
  crisis_zone:
    condition: value >= 3.0

  famine_zone:
    condition: value >= 5.0

# -----------------------------
# NL2SQL JOIN GRAPH
# -----------------------------
joins:
  children:
    - FEWS_NET_food_security_classifications_time_series_data

  external:
    - fao_trade_crops_livestock_bronze
    - FEWS_NET_market_Prices_time_series_data
    - africa_soil_moisture

# -----------------------------
# EMBEDDING TAGS
# -----------------------------
embedding_tags:
  - hunger_index
  - ipc
  - food_crisis
  - humanitarian_risk