name: fao_land_use_bronze

description: land use and land cover statistics by country (FAO RL domain)

granularity: country_year_item_element
source_type: land_use
dataset_type: time_series

geo:
  type: country
  column: area
  code_column: country_code

time:
  column: year
  type: year

entities:
  - country_code
  - item
  - element
  - item_code
  - element_code

metrics:
  - name: value
    unit: "1000 ha"

column_roles:
  domain_code: metadata
  domain: metadata
  area_code: metadata
  area: geo
  element_code: entity
  element: entity
  item_code: entity
  item: entity
  year: time
  unit: metadata
  value: metric
  country_code: geo_code
  country_name: geo
  data_source: metadata

constraints:
  requires_time_filter: true
  requires_geo_filter: true
  requires_entity_filter:
    - item
    - element

semantic_aliases:
  item:
    - land category
    - land type
    - cropland
    - land use class
  element:
    - area
    - land extent
  value:
    - surface area
    - hectares

canonical_mapping:
  country: area
  country_code: country_code
  year: year
  land_type: item
  metric_type: element
  area_value: value

query_hints:
  default_aggregation: SUM
  common_group_by: [country_code, year, item]
  time_range_supported: true
  requires_land_category_filter: true

semantic_relationships:
  shares_geo_with:
    - fao_fertilizers_nutrient_bronze
    - yield_raw_data
    - africa_Human_development_index

  shares_time_with:
    - fao_fertilizers_nutrient_bronze
    - yield_raw_data

  comparable_metrics:
    - table: yield_raw_data
      metric: yield
      relationship: "land availability vs crop productivity"

    - table: fao_fertilizers_nutrient_bronze
      metric: value
      relationship: "land base vs input intensity"

  contextual_links:
    - type: derived_metric
      target_table: yield_raw_data
      description: "yield per hectare requires land use denominator"

    - type: normalization
      target_table: fao_fertilizers_nutrient_bronze
      description: "fertilizer per hectare uses land area as denominator"

relationships:
  joinable_on: country_code

data_quality:
  numeric_columns:
    - value
    - year
    - item_code
    - element_code