table_name: FEWS_NET_market_prices_data_series
layer: data_series
domain: market_prices
parent_child_role: parent

core_relationship:
  child_table: FEWS_NET_market_Prices_time_series_data
  join_key: dataseries.id = time_series.dataseries

semantic_role:
  defines: "Market-level commodity pricing structure used for inflation and shock detection"

primary_keys:
  - id

dimensions:
  geography:
    - country
    - fewsnet_region
    - geographic_group
    - fnid

  market:
    - market
    - market_name

  commodity:
    - cpcv2
    - product
    - product_name
    - scientific_name
    - aliases

  classification:
    - is_staple_food

  pricing_context:
    - unit
    - price_type
    - currency
    - product_source

metadata:
  - data_source_document
  - data_source_organization
  - data_usage_policy
  - datasourcedocument
  - first_period_date
  - last_period_date
  - datapoint_count

nl2sql_role: structural_parent
child_table: FEWS_NET_market_Prices_time_series_data
join_key: dataseries.id = time_series.dataseries

# -----------------------------
# SEMANTIC INTENT LAYER
# -----------------------------
intent_space:
  primary_questions:
    - "What commodities exist in a market?"
    - "Which markets track staple foods?"
    - "Where are price signals strongest geographically?"

  analytical_role:
    - "Defines schema of price observation series"
    - "NOT used for numeric aggregation"

  forbidden_operations:
    - SUM(value)
    - AVG(price)

# -----------------------------
# JOIN GRAPH (CRITICAL FOR RAG)
# -----------------------------
joins:
  children:
    - table: FEWS_NET_market_Prices_time_series_data
      on: dataseries.id = dataseries

  external_links:
    - table: dim_countries
      key: country
    - table: fao_land_use_bronze
      join_hint: "correlate staple prices with cropland availability"

# -----------------------------
# NL2SQL FIELD MAP
# -----------------------------
fields:
  geography:
    - country
    - fewsnet_region
    - geographic_group

  market_entity:
    - market
    - market_name
    - fnid

  commodity:
    - cpcv2
    - product
    - product_name
    - aliases

  classification:
    - is_staple_food

  pricing_metadata:
    - unit
    - currency
    - price_type

# -----------------------------
# FILTER LOGIC RULES
# -----------------------------
filters:
  staple_filter:
    column: is_staple_food
    type: boolean

  region_filter:
    columns: [country, fewsnet_region, geographic_group]

# -----------------------------
# SEMANTIC EMBEDDING TAGS
# -----------------------------
embedding_tags:
  - food_security
  - market_signal
  - price_series
  - staple_tracking