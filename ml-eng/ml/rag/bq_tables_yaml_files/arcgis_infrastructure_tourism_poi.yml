name: arcgis_infrastructure_tourism_poi

description: infrastructure and points of interest (OSM-derived)

granularity: point
source_type: infrastructure
dataset_type: geospatial

geo:
  type: point
  geometry: geometry_wkt

entities:
  - amenity
  - tourism
  - attraction

metrics:
  - name: ele
    unit: meters

column_roles:
  geometry_wkt: geo
  amenity: entity
  tourism: entity
  attraction: entity
  ele: metric

constraints:
  requires_geo_filter: true

semantic_aliases:
  amenity:
    - infrastructure
    - facilities
    - logistics

canonical_mapping:
  infrastructure_type: amenity
  elevation: ele

semantic_relationships:
  shares_geo_with:
    - yield_raw_data
    - arcgis_vegetation_ndvi

  contextual_links:
    - type: explanatory
      target_table: yield_raw_data
      description: "infrastructure affects agricultural logistics"

relationships:
  joinable_on: geometry_wkt