table_name: FEWS_NET_Food_insecure_population_estimates_time_series_data
layer: time_series
domain: food_security_population
child_of: FEWS_NET_Food_insecure_population_estimates_data_series

join_logic:
  parent_key: dataseries.id
  child_key: dataseries

semantic_role:
  describes: "Estimated population counts under IPC phases with uncertainty bounds"

primary_keys:
  - id

time_dimensions:
  - reporting_date
  - created
  - modified
  - status_changed
  - projection_start
  - projection_end

geography:
  - country
  - country_code
  - geographic_group
  - fewsnet_region
  - geographic_unit
  - geographic_unit_name
  - geographic_unit_full_name
  - admin_0
  - admin_1
  - admin_2
  - admin_3
  - admin_4
  - fnid

metrics:
  - value
  - low_value
  - high_value
  - pct_phase3
  - pct_phase4
  - pct_phase5

classification:
  - phase
  - phase_name
  - population_range

metadata:
  - collection_status
  - collection_status_changed
  - collection_schedule
  - status
  - specialization_type
  - dataseries_specialization_type
  - data_usage_policy
  - description

nl2sql_role: observation_table
parent_table: FEWS_NET_Food_insecure_population_estimates_data_series
join_key: dataseries

metrics:
  - value
  - low_value
  - high_value

aggregation_rules:
  allowed:
    - SUM(value)
    - SUM(low_value)
    - SUM(high_value)

uncertainty_model:
  type: confidence_interval
  fields: [low_value, high_value]

embedding_tags:
  - population_estimate
  - food_insecurity_counts