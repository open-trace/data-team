table_name: ilri_crp_household_food_security_v1

fully_qualified_name: opentrace-prod-5ga4.raw_dev.ilri_crp_household_food_security_v1

layer: raw_dev

domain:
  - agriculture
  - household_food_security
  - rural_livelihoods
  - socioeconomic_analysis

summary: >
  Household-level survey dataset from ILRI CGIAR CRP containing
  agricultural production, food security, income, land use,
  livestock ownership, gender resource control, and livelihood indicators
  for Ugandan households.

grain: one_row_per_household

primary_key:
  - hh_id

time_dimension:
  type: snapshot
  reference_year: 2021

geography:
  country_column: country
  region_column: region
  district_column: district
  geographic_scope:
    - Uganda

business_entities:
  primary_entity: household

semantic_tags:
  - household_resilience
  - food_insecurity
  - agricultural_productivity
  - livelihood_diversification
  - gender_equity
  - nutrition
  - poverty
  - rural_economics

joins:

  - target_table: africa_Human_development_index
    relationship: socioeconomic_context
    join_keys:
      local:
        - country
      remote:
        - country

  - target_table: africa_nasa_power_daily_summary_bronze
    relationship: climate_food_security_analysis
    join_strategy: district_to_admin_region_mapping

  - target_table: africa_soil_moisture
    relationship: agricultural_resilience_analysis
    join_strategy: spatial_join

  - target_table: FEWS_NET_food_security_classifications_time_series_data
    relationship: regional_food_security_alignment
    join_keys:
      local:
        - region
      remote:
        - geographic_unit_name

  - target_table: FEWS_NET_Food_insecure_population_estimates_time_series_data
    relationship: vulnerability_context
    join_keys:
      local:
        - region
      remote:
        - geographic_unit_name

  - target_table: fao_land_use_bronze
    relationship: land_productivity_context
    join_keys:
      local:
        - country
      remote:
        - country_name

important_metrics:

  food_security:
    - fies_score
    - food_self_sufficiency
    - total_energy_available

  income:
    - total_income
    - farm_income
    - offfarm_income

  productivity:
    - tva_per_mae_per_day
    - land_cultivated
    - livestock_holdings

  diversification:
    - crop_diversity
    - livestock_diversity

  gender:
    - gender_male_control
    - gender_female_control

query_intents:
  - identify_food_insecure_households
  - compare_farm_vs_offfarm_income
  - analyze_gender_resource_control
  - measure_agricultural_resilience
  - correlate_climate_and_food_security
  - evaluate_income_diversification
  - assess_household_productivity

columns:

  - name: hh_id
    type: STRING
    description: Unique household identifier.
    semantic_type:
      - primary_key
      - household_id

  - name: country
    type: STRING
    description: Country name.
    semantic_type:
      - geography

  - name: region
    type: STRING
    description: Regional administrative area.
    semantic_type:
      - geography

  - name: district
    type: STRING
    description: District-level administrative area.
    semantic_type:
      - geography

  - name: household_size_members
    type: INTEGER
    description: Total household member count.
    semantic_type:
      - demographic_metric

  - name: household_size_mae
    type: FLOAT64
    description: Household size normalized to male adult equivalent units.
    semantic_type:
      - normalization_metric

  - name: land_cultivated
    type: FLOAT64
    description: Total cultivated agricultural land.
    semantic_type:
      - agricultural_asset

  - name: livestock_holdings
    type: FLOAT64
    description: Total livestock ownership indicator.
    semantic_type:
      - livestock_asset

  - name: total_income
    type: FLOAT64
    description: Total household income.
    semantic_type:
      - economic_metric

  - name: farm_income
    type: FLOAT64
    description: Income derived from farming activities.
    semantic_type:
      - agricultural_income

  - name: offfarm_income
    type: FLOAT64
    description: Non-agricultural income.
    semantic_type:
      - nonfarm_income

  - name: fies_score
    type: FLOAT64
    description: Food Insecurity Experience Scale score.
    semantic_type:
      - food_security_metric

  - name: food_self_sufficiency
    type: FLOAT64
    description: Household food self-sufficiency indicator.
    semantic_type:
      - resilience_metric

  - name: total_energy_available
    type: FLOAT64
    description: Dietary energy available to the household.
    semantic_type:
      - nutrition_metric

  - name: tva_per_mae_per_day
    type: FLOAT64
    description: Productivity metric normalized per MAE per day.
    semantic_type:
      - productivity_metric

  - name: gender_male_control
    type: FLOAT64
    description: Share of resources controlled by men.
    semantic_type:
      - gender_metric

  - name: gender_female_control
    type: FLOAT64
    description: Share of resources controlled by women.
    semantic_type:
      - gender_metric

  - name: crop_diversity
    type: FLOAT64
    description: Crop diversification indicator.
    semantic_type:
      - diversification_metric

  - name: livestock_diversity
    type: FLOAT64
    description: Livestock diversification indicator.
    semantic_type:
      - diversification_metric

  - name: ingestion_timestamp
    type: TIMESTAMP
    description: Bronze ingestion timestamp.
    semantic_type:
      - lineage_metadata

n2sql:

  default_filters:
    - country
    - region
    - district

  common_group_bys:
    - country
    - region
    - district

  common_aggregations:
    - avg(total_income)
    - avg(fies_score)
    - avg(food_self_sufficiency)
    - avg(crop_diversity)

  derived_metrics:
    - income_per_member
    - income_per_mae
    - farm_income_ratio
    - food_security_risk_score

  anti_patterns:
    - summing_food_security_scores
    - aggregating_without_geographic_filters

data_quality:

  nullable_columns:
    - region
    - district
    - farm_income
    - offfarm_income
    - crop_diversity
    - livestock_diversity

  known_issues:
    - sparse_optional_survey_fields
    - inconsistent_district_spelling
    - currency_normalization_required