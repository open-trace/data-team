name: climatewatch_climate_health_impacts

description: projected climate and health impact outcomes under policy scenarios (ClimateWatch)

granularity: location_scenario_year
source_type: climate_policy
dataset_type: time_series_projection

geo:
  type: country
  column: location
  code_column: iso_code2

time:
  column: year
  type: year

entities:
  - location
  - model
  - scenario
  - indicator

metrics:
  - name: value
    unit: dynamic

column_roles:
  id: metadata
  location: geo
  iso_code2: geo_code
  model: entity
  scenario: entity
  indicator: entity
  composite_name: metadata
  unit: metadata
  definition: metadata
  year: time
  value: metric
  ingested_at: metadata

constraints:
  requires_time_filter: true
  requires_geo_filter: true
  requires_entity_filter:
    - scenario
    - indicator

semantic_aliases:
  value:
    - impact
    - projected outcome
  indicator:
    - metric
    - impact type
  scenario:
    - policy scenario
    - projection path

canonical_mapping:
  country: location
  country_code: iso_code2
  year: year
  impact_value: value
  scenario: scenario
  metric: indicator

query_hints:
  default_aggregation: SUM
  common_group_by: [location, year, scenario, indicator]
  time_range_supported: true
  requires_scenario_filter: true

semantic_relationships:
  shares_geo_with:
    - africa_Human_development_index
    - africa_gross_domestic_product_purchasing_power_parity_bronze
    - fao_rfn

  shares_time_with:
    - africa_Human_development_index
    - africa_gross_domestic_product_purchasing_power_parity_bronze

  comparable_metrics:
    - table: africa_Human_development_index
      metric: index
      relationship: "projected health outcomes vs development levels"

    - table: fao_rfn
      metric: value
      relationship: "climate impacts vs agricultural production"

  contextual_links:
    - type: explanatory
      target_table: africa_Human_development_index
      description: "health outcomes relate to human development"

    - type: correlation
      target_table: fao_rfn
      description: "climate impacts influence agricultural systems"

relationships:
  joinable_on: location

data_quality:
  numeric_columns:
    - value