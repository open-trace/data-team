name: fao_pesticides_use_bronze

description: pesticide usage and intensity across agriculture (FAO RP domain)

granularity: country_year_item_element
source_type: agriculture_inputs
dataset_type: time_series

geo:
  type: country
  column: area
  code_column: country_code

time:
  column: year
  type: year

entities:
  - country_code
  - item
  - element
  - item_code
  - element_code

metrics:
  - name: value
    unit: dynamic

column_roles:
  domain_code: metadata
  domain: metadata
  area_code: metadata
  area: geo
  element_code: entity
  element: entity
  item_code: entity
  item: entity
  year: time
  unit: metadata
  value: metric
  country_code: geo_code
  country_name: geo
  data_source: metadata

constraints:
  requires_time_filter: true
  requires_geo_filter: true
  requires_entity_filter:
    - item
    - element
  unit_sensitive: true

semantic_aliases:
  item:
    - pesticide
    - agrochemical
    - herbicide
    - insecticide
  element:
    - use
    - intensity
    - application rate
  value:
    - quantity
    - amount

canonical_mapping:
  country: area
  country_code: country_code
  year: year
  pesticide_type: item
  metric_type: element
  usage_value: value

query_hints:
  default_aggregation: AVG
  common_group_by: [country_code, year, item, element]
  time_range_supported: true
  requires_unit_filter: true

semantic_relationships:
  shares_geo_with:
    - fao_land_use_bronze
    - fao_fertilizers_nutrient_bronze
    - yield_raw_data

  shares_time_with:
    - fao_land_use_bronze
    - yield_raw_data

  comparable_metrics:
    - table: fao_land_use_bronze
      metric: value
      relationship: "pesticide intensity vs land use pressure"

    - table: yield_raw_data
      metric: yield
      relationship: "chemical input vs agricultural output"

  contextual_links:
    - type: normalization
      target_table: fao_land_use_bronze
      description: "pesticide per hectare requires cropland denominator"

    - type: environmental_impact
      target_table: africa_soil_moisture
      description: "pesticide use impacts soil health and moisture retention"

relationships:
  joinable_on: country_code

data_quality:
  numeric_columns:
    - value
    - year
    - item_code
    - element_code