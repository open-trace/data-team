name: arcgis_rarity_80_birds_africa

description: biodiversity rarity and species richness across Africa

granularity: region
source_type: biodiversity
dataset_type: geospatial

geo:
  type: polygon
  geometry: geometry_wkt

entities: []

metrics:
  - name: rar_bird
  - name: rar_all
  - name: rich_bird
  - name: rich_mamm
  - name: rich_amph
  - name: area_km2

column_roles:
  geometry_wkt: geo
  rar_bird: metric
  rar_all: metric
  rich_bird: metric
  rich_mamm: metric
  rich_amph: metric
  area_km2: metric

constraints:
  requires_geo_filter: true

semantic_aliases:
  rar_all:
    - biodiversity
    - ecosystem quality

canonical_mapping:
  biodiversity_index: rar_all
  area: area_km2

semantic_relationships:
  shares_geo_with:
    - arcgis_land_protected_areas
    - yield_raw_data

  contextual_links:
    - type: constraint
      target_table: yield_raw_data
      description: "high biodiversity areas sensitive to agriculture"

relationships:
  joinable_on: geometry_wkt