name: africa_nasa_power_daily_summary_bronze

description: daily solar radiation and environmental data for African regions (NASA POWER)

granularity: region_day
source_type: climate
dataset_type: time_series

geo:
  type: region
  column: admin_region
  code_column: country_code

time:
  column: ingestion_id
  type: date_encoded

entities:
  - admin_region
  - country_code

metrics:
  - name: par_solar_at_noon
    unit: w_m2
  - name: shortwave_irradiance
    unit: kw_m2_day
  - name: uva_radiation
    unit: w_m2
  - name: uvb_radiation
    unit: w_m2
  - name: elevation_meters
    unit: meters

column_roles:
  ingestion_id: time
  country_code: geo_code
  admin_region: geo
  elevation_meters: metric
  par_solar_at_noon: metric
  shortwave_irradiance: metric
  uva_radiation: metric
  uvb_radiation: metric
  fetched_at: metadata
  processed_at: metadata

constraints:
  requires_time_filter: true
  requires_geo_filter: true

semantic_aliases:
  par_solar_at_noon:
    - solar radiation
    - photosynthesis light
    - par
  shortwave_irradiance:
    - solar energy
    - irradiance
  elevation_meters:
    - altitude
    - elevation
  uva_radiation:
    - uv radiation
  uvb_radiation:
    - uv index

canonical_mapping:
  country_code: country_code
  region: admin_region
  date: ingestion_id
  solar_radiation: par_solar_at_noon
  irradiance: shortwave_irradiance
  elevation: elevation_meters

query_hints:
  default_aggregation: AVG
  common_group_by: [admin_region]
  time_range_supported: true

semantic_relationships:
  shares_geo_with:
    - africa_Human_development_index
    - africa_gross_domestic_product_purchasing_power_parity_bronze
    - fao_rfn
    - yield_raw_data

  shares_time_with:
    - fao_rfn
    - yield_raw_data

  comparable_metrics:
    - table: yield_raw_data
      metric: yield
      relationship: "solar radiation vs crop yield"

    - table: fao_rfn
      metric: value
      relationship: "climate conditions vs agricultural production"

  contextual_links:
    - type: explanatory
      target_table: yield_raw_data
      description: "solar radiation impacts crop growth and productivity"

    - type: correlation
      target_table: fao_rfn
      description: "environmental conditions influence agricultural outputs"

relationships:
  joinable_on: country_code

data_quality:
  numeric_columns:
    - par_solar_at_noon
    - shortwave_irradiance
    - uva_radiation
    - uvb_radiation
    - elevation_meters