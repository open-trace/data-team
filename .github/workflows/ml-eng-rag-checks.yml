name: ML Eng — RAG (Qdrant) syntax checks

on:
  push:
    branches: [main, develop]
    paths:
      - 'ml-eng/ml/rag/**'
      - 'ml-eng/requirements*.txt'
      - '.github/workflows/ml-eng-rag-checks.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'ml-eng/ml/rag/**'
      - 'ml-eng/requirements*.txt'
      - '.github/workflows/ml-eng-rag-checks.yml'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install minimal deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r ml-eng/requirements.txt
      - name: Compile RAG modules
        run: |
          . .venv/bin/activate
          python -m compileall -q ml-eng/ml/rag

