name: Data Eng — Terraform fmt

on:
  push:
    branches: [main, develop]
    paths:
      - 'data-eng/infra/**'
      - '.github/workflows/data-eng-terraform.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'data-eng/infra/**'
      - '.github/workflows/data-eng-terraform.yml'

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'
      - name: terraform fmt (check)
        run: terraform fmt -check -recursive data-eng/infra
