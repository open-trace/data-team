name: dbt CI

on:
  push:
    branches: [main, develop]
    paths:
      - "dbt/**"
      - ".github/workflows/dbt-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "dbt/**"
      - ".github/workflows/dbt-ci.yml"

jobs:
  dbt-build-silver:
    runs-on: ubuntu-latest
    env:
      DBT_PROFILES_DIR: dbt
      DBT_TARGET: silver_sa
      BQ_PROJECT: ${{ vars.BQ_PROJECT }}
      BQ_DATASET_BRONZE: ${{ vars.BQ_DATASET_BRONZE }}
      BQ_DATASET_SILVER: ${{ vars.BQ_DATASET_SILVER }}
      BQ_DATASET_GOLD: ${{ vars.BQ_DATASET_GOLD }}
      DBT_BIGQUERY_LOCATION: ${{ vars.DBT_BIGQUERY_LOCATION }}
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-bigquery

      - name: Configure Google service account key
        shell: bash
        run: |
          if [ -z "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" ]; then
            echo "Missing secret: GCP_SERVICE_ACCOUNT_KEY"
            exit 1
          fi
          printf '%s' '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > /tmp/gcp-key.json

      - name: Validate required BigQuery variables
        shell: bash
        run: |
          required_vars=("BQ_PROJECT" "BQ_DATASET_SILVER")
          for v in "${required_vars[@]}"; do
            if [ -z "${!v}" ]; then
              echo "Missing required repository variable: $v"
              exit 1
            fi
          done

      - name: dbt deps
        run: dbt deps --project-dir dbt

      - name: dbt debug
        run: dbt debug --project-dir dbt --target silver_sa

      - name: dbt parse
        run: dbt parse --project-dir dbt --target silver_sa

      - name: dbt build silver
        run: dbt build --project-dir dbt --target silver_sa --select silver.*
