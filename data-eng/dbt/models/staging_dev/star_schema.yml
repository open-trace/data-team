version: 2

models:
  - name: stg_silver_star_metrics
    description: "Canonical silver staging layer used to standardize measures before building the star schema."
    columns:
      - name: source_name
      - name: domain_name
      - name: indicator_name
      - name: country_code
      - name: country_name
      - name: period_year
      - name: metric_value

  - name: dim_country
    description: "Country master dimension."
    columns:
      - name: country_key
        tests: [not_null, unique]

  - name: dim_period
    description: "Time master dimension at year grain."
    columns:
      - name: period_key
        tests: [not_null, unique]

  - name: dim_geography
    description: "Geographic hierarchy dimension."
    columns:
      - name: geography_key
        tests: [not_null, unique]

  - name: dim_indicator
    description: "Indicator/metric dimension."
    columns:
      - name: indicator_key
        tests: [not_null, unique]

  - name: dim_source
    description: "Data-source dimension."
    columns:
      - name: source_key
        tests: [not_null, unique]

  - name: dim_unit
    description: "Measurement unit dimension."
    columns:
      - name: unit_key
        tests: [not_null, unique]

  - name: dim_crop
    description: "Crop/product dimension."
    columns:
      - name: crop_key
        tests: [not_null, unique]

  - name: dim_value_chain
    description: "Value chain stage dimension."
