# dbt project: OpenTrace data team (landing → raw_dev → staging_dev → mart_dev).
# BigQuery dataset IDs match folder names; override with BQ_DATASET_* env vars.
# Run with: dbt run --target raw_dev | staging_dev | mart_dev

name: open_trace
version: "1.0.0"
config-version: 2
profile: open_trace

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Datasets (from env; env names keep BQ_DATASET_BRONZE etc. for backwards compatibility)
  landing_dataset: "{{ env_var('BQ_DATASET_LANDING', 'landing') }}"
  raw_dev_dataset: "{{ env_var('BQ_DATASET_BRONZE', 'raw_dev') }}"
  staging_dev_dataset: "{{ env_var('BQ_DATASET_SILVER', 'staging_dev') }}"
  mart_dev_dataset: "{{ env_var('BQ_DATASET_GOLD', 'mart_dev') }}"

models:
  open_trace:
    landing:
      +schema: "{{ env_var('BQ_DATASET_LANDING', 'landing') }}"
      +database: "{{ env_var('BQ_PROJECT', 'your-gcp-project-id') }}"
    raw_dev:
      +schema: "{{ env_var('BQ_DATASET_BRONZE', 'raw_dev') }}"
      +database: "{{ env_var('BQ_PROJECT', 'your-gcp-project-id') }}"
    staging_dev:
      +schema: "{{ env_var('BQ_DATASET_SILVER', 'staging_dev') }}"
      +database: "{{ env_var('BQ_PROJECT', 'your-gcp-project-id') }}"
    mart_dev:
      +schema: "{{ env_var('BQ_DATASET_GOLD', 'mart_dev') }}"
      +database: "{{ env_var('BQ_PROJECT', 'your-gcp-project-id') }}"
