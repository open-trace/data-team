# Local PostgreSQL + optional full setup (schema, bronze sync, GIS) in Docker.
#
# Postgres only (DB + datateam_local created on first run):
#   docker compose up -d
#
# Everything in Docker (Postgres + create tables + sync from BigQuery + load GIS CSV):
#   Ensure data/local/.env and data/local/keys/opentrace-bq-key.json exist, then:
#   docker compose --profile setup up
#   The "setup" container runs populate_local_db.sh once and exits.
#
# RAG (profile rag): requires data/local/.env for env_file; populate data/local/vector_db on the host.
#   Optional host overrides: GCP_SA_KEY_HOST_PATH, RAG_VECTOR_DB_HOST_PATH, RAG_API_PORT, RAG_STREAMLIT_PORT.
#   docker compose --profile rag build rag-api && docker compose --profile rag up rag-api
#   With Streamlit: docker compose --profile rag up rag-api rag-streamlit
#
# From the host, use LOCAL_DB_URL=postgresql://postgres:postgres@localhost:5432/datateam_local
# to connect to Postgres. Stop: docker compose down

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/local/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  setup:
    build: .
    profiles:
      - setup
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    env_file:
      - data/local/.env
    environment:
      LOCAL_DB_URL: postgresql://postgres:postgres@postgres:5432/datateam_local
      GOOGLE_APPLICATION_CREDENTIALS: /app/data/local/keys/opentrace-bq-key.json
    working_dir: /app
    command: bash data/local/scripts/populate_local_db.sh
    restart: "no"

  rag-api:
    profiles:
      - rag
    build:
      context: .
      dockerfile: Dockerfile.rag
    image: opentrace-rag-api:latest
    ports:
      - "${RAG_API_PORT:-7860}:7860"
    env_file:
      - data/local/.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp_sa.json
      RAG_VECTOR_DB_PATH: /app/data/local/vector_db
    volumes:
      - ${RAG_VECTOR_DB_HOST_PATH:-./data/local/vector_db}:/app/data/local/vector_db
      - ${GCP_SA_KEY_HOST_PATH:-./data/local/keys/opentrace-bq-key.json}:/run/secrets/gcp_sa.json:ro
    restart: unless-stopped

  rag-streamlit:
    profiles:
      - rag
    build:
      context: .
      dockerfile: Dockerfile.rag
    image: opentrace-rag-api:latest
    ports:
      - "${RAG_STREAMLIT_PORT:-8501}:8501"
    env_file:
      - data/local/.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp_sa.json
      RAG_VECTOR_DB_PATH: /app/data/local/vector_db
    volumes:
      - ${RAG_VECTOR_DB_HOST_PATH:-./data/local/vector_db}:/app/data/local/vector_db
      - ${GCP_SA_KEY_HOST_PATH:-./data/local/keys/opentrace-bq-key.json}:/run/secrets/gcp_sa.json:ro
    working_dir: /app
    command:
      [
        "python",
        "-m",
        "streamlit",
        "run",
        "ml/rag/streamlit_app.py",
        "--server.port=8501",
        "--server.address=0.0.0.0",
      ]
    restart: unless-stopped

volumes:
  postgres_data:
